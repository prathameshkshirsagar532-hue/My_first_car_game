<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Car Game</title>
    <style>
        body { margin: 0; background: #222; text-align: center; font-family: Arial, sans-serif; color: white; user-select: none; }
        #gameCanvas { background: #444; border: 4px solid white; margin-top: 10px; display: inline-block; max-width: 95vw; height: auto; }
        h1 { margin-bottom: 5px; font-size: 24px; }
        p { margin: 5px; font-size: 14px; }
        
        /* Mobile Buttons Style */
        .controls { display: flex; justify-content: center; gap: 40px; margin-top: 15px; }
        .btn { width: 80px; height: 80px; background: #555; border: 3px solid white; border-radius: 50%; color: white; font-size: 30px; font-weight: bold; display: flex; align-items: center; justify-content: center; -webkit-user-select: none; }
        .btn:active { background: cyan; color: black; }
    </style>
</head>
<body>
    <h1>Simple Car Game</h1>
    <p>Use Buttons on Mobile or Arrows on PC</p>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <!-- Mobile Touch Controls -->
    <div class="controls">
        <div id="leftBtn" class="btn">◀</div>
        <div id="rightBtn" class="btn">▶</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
